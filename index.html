<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chinese Chess (Xiangqi)</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Chinese Chess (Xiangqi)</h1>
      <p class="help">Click a piece, then click a highlighted square to move.</p>
      <div class="status-wrap">
        <div id="status">Red to move</div>
        <button id="reset">Reset Game</button>
      </div>
      <div id="board" class="board" aria-label="Xiangqi board"></div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
